<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KYC System - Home</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #dbeafe, #f1f5f9);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            width: 100%;
            max-width: 500px;
            padding: 40px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.35);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
            animation: fadeIn 0.8s ease;
            text-align: center;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 32px;
            color: #1a2b4c;
            margin-bottom: 20px;
            font-weight: bold;
            animation: slideDown 0.7s ease;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        p {
            font-size: 16px;
            color: #374151;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 18px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            color: #374151;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.6);
            font-size: 14px;
            background: rgba(255,255,255,0.55);
            transition: 0.25s ease;
            animation: fadeIn 0.8s ease;
        }

        input:hover {
            border-color: #93c5fd;
            background: rgba(255,255,255,0.75);
        }

        input:focus {
            border-color: #3b82f6;
            outline: none;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.25);
            background: rgba(255,255,255,0.95);
        }

        .btn-start {
            padding: 14px 28px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.25s ease;
            text-decoration: none;
            display: inline-block;
            width: 100%;
        }

        .btn-start:hover {
            background: #1e4fcf;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(37,99,235,0.3);
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>KYC System Login</h1>
        <p>Please sign in to access the KYC verification process.</p>
        <form action="#" method="post">
            <div class="form-group">
                <label for="username">Username or Email</label>
                <input type="text" id="username" placeholder="Enter your username or email" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn-start">Sign In</button>
        </form>
        <p style="margin-top: 20px; font-size: 14px; color: #6b7280;">Don't have an account? <a href="project.html" style="color: #2563eb; text-decoration: none;">Sign up here</a></p>
    </div>
</body>
</html>
